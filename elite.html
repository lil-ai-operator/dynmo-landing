<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dynmo Premium Motion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #030712; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        .bg-glow {
            position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(33,124,255,0.15) 0%, rgba(0,0,0,0) 70%);
            top: 50%; left: 50%; transform: translate(-50%, -50%); filter: blur(60px); animation: pulseGlow 6s infinite alternate;
        }

        .phone-frame {
            position: relative; width: 380px; height: 800px; border-radius: 48px;
            background: linear-gradient(180deg, rgba(20,30,50,0.8) 0%, rgba(10,15,30,0.95) 100%);
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 40px 80px rgba(0,0,0,0.8), inset 0 2px 10px rgba(255,255,255,0.05);
            padding: 40px 20px 20px; overflow: hidden; backdrop-filter: blur(20px);
            transform: scale(0.95); animation: float 6s ease-in-out infinite;
        }

        .header { text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; margin-bottom: 20px; }
        .header h3 { font-size: 16px; font-weight: 600; color: #fff; }
        .header p { font-size: 12px; color: #3b82f6; font-weight: 500; letter-spacing: 1px; }

        .chat-container { display: flex; flex-direction: column; gap: 16px; padding-bottom: 40px; }

        .msg {
            max-width: 85%; padding: 14px 18px; border-radius: 22px; font-size: 15px; line-height: 1.5;
            opacity: 0; transform: translateY(20px); animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .msg.user { 
            align-self: flex-end; background: rgba(255,255,255,0.1); border-bottom-right-radius: 6px; 
        }
        
        .msg.bot { 
            align-self: flex-start; background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%); border-bottom-left-radius: 6px;
            box-shadow: 0 10px 25px rgba(37,99,235,0.3);
        }

        .msg.confirm {
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            box-shadow: 0 10px 25px rgba(16,185,129,0.3);
        }

        .typing { display: flex; gap: 4px; padding: 16px 20px; align-self: flex-start; background: rgba(255,255,255,0.05); border-radius: 20px; border-bottom-left-radius: 6px; width: fit-content; opacity: 0; transform: translateY(20px); }
        .typing span { width: 8px; height: 8px; background: #fff; border-radius: 50%; opacity: 0.4; animation: typeBounce 1.4s infinite ease-in-out both; }
        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes popIn { to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0%, 100% { transform: translateY(0) scale(0.95); } 50% { transform: translateY(-15px) scale(0.95); } }
        @keyframes typeBounce { 0%, 80%, 100% { transform: scale(0); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
        @keyframes pulseGlow { to { transform: translate(-50%, -50%) scale(1.1); opacity: 0.6; } }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="phone-frame">
        <div class="header">
            <h3>Customer Booking</h3>
            <p>ONLINE NOW</p>
        </div>
        <div class="chat-container" id="chat">
            <!-- JS injects here -->
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const script = [
            { type: 'user', text: 'Hi, how much is a skin fade?' },
            { type: 'typing', delay: 1000 },
            { type: 'bot', text: 'Skin fade is £22. Want me to book you in?' },
            { type: 'user', text: 'Yes please', delay: 1500 },
            { type: 'typing', delay: 1000 },
            { type: 'bot', text: 'I’ve got 2pm or 4pm tomorrow. Which works?' },
            { type: 'user', text: '4pm', delay: 1500 },
            { type: 'typing', delay: 1200 },
            { type: 'confirm', text: 'Perfect. You’re booked in for 4pm tomorrow 💈' }
        ];

        let i = 0;
        let typingNode = null;

        function runChat() {
            if (i >= script.length) return setTimeout(() => { chat.innerHTML = ''; i=0; runChat(); }, 4000); // loop
            
            const step = script[i];
            
            if (typingNode) {
                typingNode.remove();
                typingNode = null;
            }

            if (step.type === 'typing') {
                typingNode = document.createElement('div');
                typingNode.className = 'msg typing';
                typingNode.innerHTML = '<span></span><span></span><span></span>';
                chat.appendChild(typingNode);
                i++;
                setTimeout(runChat, step.delay);
            } else {
                const msg = document.createElement('div');
                msg.className = `msg ${step.type}`;
                msg.innerText = step.text;
                chat.appendChild(msg);
                i++;
                setTimeout(runChat, step.delay || 800);
            }
        }
        
        setTimeout(runChat, 1000);
    </script>
</body>
</html>
