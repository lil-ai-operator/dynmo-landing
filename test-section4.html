<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Section 4 Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        body { background: #030712; color: #fff; min-height: 100vh; padding: 40px 20px; }
        
        .section-title { font-size: 40px; font-weight: 800; text-align: center; margin-bottom: 20px; }
        .subtitle { text-align: center; color: #94a3b8; max-width: 700px; margin: 0 auto 50px; font-size: 18px; line-height: 1.6; }
        
        .proof-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            max-width: 1100px;
            margin: 0 auto;
        }
        .proof-card.full { grid-column: 1 / -1; }
        
        .proof-card {
            background: linear-gradient(180deg, rgba(20,30,50,0.9) 0%, rgba(10,15,30,0.95) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 28px;
            position: relative;
            overflow: hidden;
        }
        
        .proof-label {
            display: inline-block;
            background: rgba(33,124,255,0.15);
            color: #60a5fa;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
        }
        
        @keyframes popIn {
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes typeBounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }
        
        .chat-thread {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .msg {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.5;
            opacity: 0;
            transform: translateY(20px);
            animation: popIn 0.5s ease forwards;
        }
        .msg span {
            display: block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.7;
            margin-bottom: 4px;
        }
        .msg.user {
            align-self: flex-end;
            background: rgba(255,255,255,0.1);
            border-bottom-right-radius: 6px;
        }
        .msg.bot {
            align-self: flex-start;
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            border-bottom-left-radius: 6px;
        }
        .msg.confirm {
            align-self: flex-start;
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            border-bottom-left-radius: 6px;
        }
        .msg.typing {
            display: flex;
            gap: 4px;
            padding: 16px 20px;
            align-self: flex-start;
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            border-bottom-left-radius: 6px;
            width: fit-content;
        }
        .msg.typing span {
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            opacity: 0.4;
            animation: typeBounce 1.4s infinite ease-in-out both;
            margin: 0;
        }
        .msg.typing span:nth-child(1) { animation-delay: -0.32s; }
        .msg.typing span:nth-child(2) { animation-delay: -0.16s; }
        .msg.event {
            align-self: center;
            background: rgba(255,255,255,0.08);
            border-radius: 999px;
            padding: 8px 16px;
            font-size: 12px;
            color: #94a3b8;
        }
        
        .proof-close {
            text-align: center;
            margin-top: 40px;
            color: #60a5fa;
            font-size: 16px;
            font-weight: 500;
        }
        
        @media (max-width: 768px) {
            .proof-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <h2 class="section-title">See Dynmo in action</h2>
    <p class="subtitle">Here's what it looks like when a customer messages your business and Dynmo handles it instantly.</p>
    
    <div class="proof-grid">
        <div class="proof-card" id="demo-1">
            <div class="proof-label">Barbers • Booking</div>
            <div class="chat-thread"></div>
        </div>
        <div class="proof-card" id="demo-2">
            <div class="proof-label">Restaurants • Upselling</div>
            <div class="chat-thread"></div>
        </div>
        <div class="proof-card full" id="demo-3">
            <div class="proof-label">Gyms • Missed Calls</div>
            <div class="chat-thread"></div>
        </div>
    </div>
    
    <p class="proof-close">While you're busy, Dynmo is handling conversations like this all day.</p>

    <script>
        const demoScripts = [
            {
                container: document.querySelector('#demo-1 .chat-thread'),
                steps: [
                    { type: 'user', text: 'Hi, how much is a skin fade?' },
                    { type: 'typing', delay: 800 },
                    { type: 'bot', text: 'Skin fade is £22. Want me to book you in?', delay: 1500 },
                    { type: 'user', text: 'Yes please', delay: 1000 },
                    { type: 'typing', delay: 800 },
                    { type: 'bot', text: 'I\'ve got 2pm or 4pm tomorrow. Which works?' },
                    { type: 'user', text: '4pm', delay: 1200 },
                    { type: 'typing', delay: 900 },
                    { type: 'confirm', text: 'Perfect. You\'re booked in for 4pm tomorrow 💈', delay: 4000 }
                ]
            },
            {
                container: document.querySelector('#demo-2 .chat-thread'),
                steps: [
                    { type: 'user', text: 'Can I book a table for 2 tonight at 7?' },
                    { type: 'typing', delay: 1200 },
                    { type: 'bot', text: 'Done. I have a table at 7pm. Would you like to pre-order our sharing platter special for £30?' },
                    { type: 'user', text: 'Yes please', delay: 1500 },
                    { type: 'typing', delay: 1000 },
                    { type: 'confirm', text: 'Perfect. Table for 2 at 7pm + sharing platter confirmed 🍷', delay: 4000 }
                ]
            },
            {
                container: document.querySelector('#demo-3 .chat-thread'),
                steps: [
                    { type: 'event', text: 'Missed call detected', delay: 800 },
                    { type: 'bot', text: 'Hey, sorry we missed your call! How can we help?', delay: 1500 },
                    { type: 'user', text: 'Do you have space in the 6pm HIIT class?', delay: 1500 },
                    { type: 'typing', delay: 1000 },
                    { type: 'bot', text: 'Yes, 2 spots left for 6pm. Want me to grab one for you?' },
                    { type: 'user', text: 'Yes please', delay: 1000 },
                    { type: 'typing', delay: 800 },
                    { type: 'confirm', text: 'Done. You\'re booked in. See you at 6pm 🥊', delay: 4000 }
                ]
            }
        ];

        function runDemo(demo) {
            if (!demo.container) return;
            let i = 0;
            let typingNode = null;
            
            function step() {
                if (i >= demo.steps.length) {
                    setTimeout(() => { demo.container.innerHTML = ''; i = 0; step(); }, 2000);
                    return;
                }
                const s = demo.steps[i];
                if (typingNode) { typingNode.remove(); typingNode = null; }
                
                if (s.type === 'typing') {
                    typingNode = document.createElement('div');
                    typingNode.className = 'msg typing';
                    typingNode.innerHTML = '<span></span><span></span><span></span>';
                    demo.container.appendChild(typingNode);
                    i++;
                    setTimeout(step, s.delay || 1000);
                } else if (s.type === 'event') {
                    const msg = document.createElement('div');
                    msg.className = 'msg event';
                    msg.innerHTML = '<span>' + s.text + '</span>';
                    demo.container.appendChild(msg);
                    i++;
                    setTimeout(step, s.delay || 800);
                } else {
                    const msg = document.createElement('div');
                    msg.className = 'msg ' + s.type;
                    const sender = s.type === 'user' ? 'Customer' : 'Dynmo';
                    msg.innerHTML = '<span>' + sender + '</span><p>' + s.text + '</p>';
                    demo.container.appendChild(msg);
                    i++;
                    setTimeout(step, s.delay || 1200);
                }
            }
            
            const obs = new IntersectionObserver(entries => {
                if (entries[0].isIntersecting) {
                    setTimeout(step, 500);
                    obs.unobserve(demo.container);
                }
            }, { threshold: 0.1 });
            obs.observe(demo.container);
        }

        demoScripts.forEach(runDemo);
    </script>
</body>
</html>
