<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Section 4 Test - Single Phone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #030712; color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 60px 20px; }
        
        .section-title { font-size: clamp(28px, 5vw, 44px); font-weight: 800; text-align: center; margin-bottom: 16px; letter-spacing: -1px; }
        .subtitle { text-align: center; color: #94a3b8; max-width: 600px; margin: 0 auto 50px; font-size: 17px; line-height: 1.6; }
        
        .phone-wrapper {
            position: relative;
            width: 380px;
            max-width: 100%;
        }

        .phone-frame {
            position: relative;
            background: linear-gradient(180deg, rgba(20,30,50,0.9) 0%, rgba(10,15,30,0.98) 100%);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 48px;
            padding: 20px 16px 16px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6), 0 0 80px rgba(33,124,255,0.08);
            overflow: hidden;
        }

        /* Notch */
        .phone-frame::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 28px;
            background: #030712;
            border-radius: 0 0 18px 18px;
            z-index: 10;
        }

        .phone-header {
            text-align: center;
            padding: 24px 0 16px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 4px;
        }
        .phone-header .demo-label {
            display: inline-block;
            background: rgba(33,124,255,0.15);
            color: #60a5fa;
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.4s ease;
        }
        .phone-header .status {
            display: block;
            color: #4ade80;
            font-size: 11px;
            margin-top: 8px;
            font-weight: 500;
        }
        .phone-header .status::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #4ade80;
            border-radius: 50%;
            margin-right: 4px;
            animation: statusPulse 2s ease infinite;
        }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .chat-area {
            height: 380px;
            overflow-y: auto;
            position: relative;
            padding: 12px 4px;
            scrollbar-width: none;
        }
        .chat-area::-webkit-scrollbar { display: none; }

        .chat-scroll {
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: opacity 0.4s ease;
        }
        .chat-scroll.fading { opacity: 0; }

        @keyframes popIn {
            from { opacity: 0; transform: translateY(16px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes typeBounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        .msg {
            max-width: 82%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 13px;
            line-height: 1.45;
            opacity: 0;
            transform: translateY(16px) scale(0.97);
            animation: popIn 0.45s ease forwards;
        }
        .msg .sender {
            display: block;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.6;
            margin-bottom: 3px;
        }
        .msg.user {
            align-self: flex-end;
            background: rgba(255,255,255,0.08);
            border-bottom-right-radius: 6px;
        }
        .msg.bot {
            align-self: flex-start;
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            border-bottom-left-radius: 6px;
        }
        .msg.confirm {
            align-self: flex-start;
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            border-bottom-left-radius: 6px;
        }
        .msg.typing {
            display: flex;
            gap: 5px;
            padding: 14px 20px;
            align-self: flex-start;
            background: rgba(255,255,255,0.06);
            border-radius: 20px;
            border-bottom-left-radius: 6px;
            width: fit-content;
            opacity: 1;
            transform: none;
            animation: none;
        }
        .msg.typing .dot {
            width: 7px;
            height: 7px;
            background: #fff;
            border-radius: 50%;
            opacity: 0.4;
            animation: typeBounce 1.4s infinite ease-in-out both;
        }
        .msg.typing .dot:nth-child(1) { animation-delay: -0.32s; }
        .msg.typing .dot:nth-child(2) { animation-delay: -0.16s; }
        .msg.event {
            align-self: center;
            background: rgba(255,255,255,0.06);
            border-radius: 999px;
            padding: 6px 14px;
            font-size: 11px;
            color: #94a3b8;
        }

        .proof-close {
            text-align: center;
            margin-top: 40px;
            color: #60a5fa;
            font-size: 15px;
            font-weight: 500;
            max-width: 500px;
        }

        /* Background glow */
        .bg-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(33,124,255,0.1) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            filter: blur(40px);
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <h2 class="section-title">See Dynmo in action</h2>
    <p class="subtitle">Here's what it looks like when a customer messages your business and Dynmo handles it instantly.</p>
    
    <div class="phone-wrapper">
        <div class="phone-frame">
            <div class="phone-header">
                <span class="demo-label" id="demoLabel">Barbers • Booking</span>
                <span class="status">Online now</span>
            </div>
            <div class="chat-area">
                <div class="chat-scroll" id="chatScroll"></div>
            </div>
        </div>
    </div>
    
    <p class="proof-close">While you're busy, Dynmo is handling conversations like this all day.</p>

    <script>
        var demos = [
            {
                label: 'Trades • Quotes & Bookings',
                steps: [
                    { type: 'user', text: 'Hi, do you do emergency plumbing? Got a burst pipe' },
                    { type: 'typing', delay: 700 },
                    { type: 'bot', text: 'Yes we do emergency callouts. We can be there by 2pm today. Want me to book you in?' },
                    { type: 'user', text: 'Yes please, how much is the callout?' },
                    { type: 'typing', delay: 600 },
                    { type: 'bot', text: 'Callout is \u00a349, hourly rate \u00a365 after. Shall I take payment now to secure the slot?' },
                    { type: 'user', text: 'Yes go on then' },
                    { type: 'typing', delay: 500 },
                    { type: 'confirm', text: 'Done. You\u2019re booked for 2pm today. Our plumber will call before arriving. \uD83D\uDEE0' }
                ]
            },
            {
                label: 'Barbers • Booking',
                steps: [
                    { type: 'user', text: 'Hi, how much is a skin fade?' },
                    { type: 'typing', delay: 600 },
                    { type: 'bot', text: 'Skin fade is \u00a322. Want me to book you in?' },
                    { type: 'user', text: 'Yes please' },
                    { type: 'typing', delay: 500 },
                    { type: 'bot', text: 'I\u2019ve got 2pm or 4pm tomorrow. Which works?' },
                    { type: 'user', text: '4pm' },
                    { type: 'typing', delay: 500 },
                    { type: 'confirm', text: 'Perfect. You\u2019re booked in for 4pm tomorrow \uD83D\uDC88' }
                ]
            },
            {
                label: 'Restaurants • Upselling',
                steps: [
                    { type: 'user', text: 'Can I book a table for 2 tonight at 7?' },
                    { type: 'typing', delay: 700 },
                    { type: 'bot', text: 'Done. I have a table at 7pm. Want to pre-order our sharing platter for \u00a330?' },
                    { type: 'user', text: 'Yeah go on then' },
                    { type: 'typing', delay: 600 },
                    { type: 'confirm', text: 'Perfect. Table for 2 at 7pm + sharing platter confirmed \uD83C\uDF77' }
                ]
            },
            {
                label: 'Gyms • Missed Calls',
                steps: [
                    { type: 'event', text: 'Missed call detected' },
                    { type: 'bot', text: 'Hey, sorry we missed your call! How can we help?' },
                    { type: 'user', text: 'Do you have space in the 6pm HIIT class?' },
                    { type: 'typing', delay: 600 },
                    { type: 'bot', text: 'Yes, 2 spots left for 6pm. Want me to grab one for you?' },
                    { type: 'user', text: 'Yes please' },
                    { type: 'typing', delay: 500 },
                    { type: 'confirm', text: 'Done. You\u2019re booked in. See you at 6pm \uD83E\uDD4A' }
                ]
            },
        ];

        var chatScroll = document.getElementById('chatScroll');
        var demoLabel = document.getElementById('demoLabel');
        var currentDemo = 0;
        var typingEl = null;

        function runDemo(index) {
            var demo = demos[index];
            demoLabel.textContent = demo.label;
            chatScroll.innerHTML = '';
            typingEl = null;
            
            var i = 0;
            
            function step() {
                if (i >= demo.steps.length) {
                    setTimeout(function() {
                        chatScroll.classList.add('fading');
                        setTimeout(function() {
                            currentDemo = (currentDemo + 1) % demos.length;
                            chatScroll.classList.remove('fading');
                            runDemo(currentDemo);
                        }, 600);
                    }, 2500);
                    return;
                }
                
                var s = demo.steps[i];
                
                if (typingEl) {
                    typingEl.remove();
                    typingEl = null;
                }
                
                if (s.type === 'typing') {
                    typingEl = document.createElement('div');
                    typingEl.className = 'msg typing';
                    typingEl.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
                    chatScroll.appendChild(typingEl);
                    i++;
                    setTimeout(step, s.delay || 700);
                } else if (s.type === 'event') {
                    var el = document.createElement('div');
                    el.className = 'msg event';
                    el.textContent = s.text;
                    chatScroll.appendChild(el);
                    i++;
                    setTimeout(step, 1000);
                } else {
                    var el = document.createElement('div');
                    el.className = 'msg ' + s.type;
                    var sender = s.type === 'user' ? 'Customer' : 'Dynmo';
                    el.innerHTML = '<span class="sender">' + sender + '</span>' + s.text;
                    chatScroll.appendChild(el);
                    i++;
                    setTimeout(step, s.type === 'confirm' ? 1800 : 1000);
                }
            }
            
            setTimeout(step, 800);
        }

        runDemo(0);
    </script>
</body>
</html>
